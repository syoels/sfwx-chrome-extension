<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 400px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans", Helvetica, Arial, sans-serif;
      background: #0d1117;
      color: #e6edf3;
      padding: 24px;
    }
    .header {
      display: flex; align-items: center; gap: 10px; margin-bottom: 24px;
      padding-bottom: 16px; border-bottom: 1px solid #30363d;
    }
    .header svg { fill: #f0f6fc; width: 24px; height: 24px; flex-shrink: 0; }
    .header h1 { font-size: 18px; font-weight: 600; color: #f0f6fc; }
    .field { margin-bottom: 16px; }
    .field label {
      display: block; font-size: 14px; font-weight: 600;
      color: #e6edf3; margin-bottom: 6px;
    }
    .field .hint {
      font-size: 12px; color: #7d8590; margin-bottom: 6px;
    }
    .field input {
      width: 100%; padding: 6px 12px; font-size: 14px;
      background: #0d1117; border: 1px solid #30363d; border-radius: 6px;
      color: #e6edf3; outline: none; font-family: inherit;
    }
    .field input:focus { border-color: #58a6ff; box-shadow: 0 0 0 3px rgba(88,166,255,0.3); }
    .preview {
      margin: 20px 0; padding: 12px 16px;
      background: #161b22; border: 1px solid #30363d; border-radius: 6px;
      font-size: 14px; color: #7d8590;
    }
    .preview .repo-path {
      color: #f0f6fc; font-weight: 600;
    }
    .preview .repo-path .owner { font-weight: 400; color: #58a6ff; }
    .preview .repo-path .repo { color: #58a6ff; font-weight: 600; }
    .preview .branch {
      display: inline-block; margin-top: 8px;
      background: #21262d; border: 1px solid #363b42; border-radius: 6px;
      padding: 2px 8px; font-size: 12px;
      font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, monospace;
      color: #58a6ff;
    }
    .btn-row { display: flex; gap: 8px; margin-top: 20px; }
    .btn {
      padding: 6px 16px; font-size: 14px; font-weight: 500;
      border-radius: 6px; cursor: pointer; font-family: inherit;
    }
    .btn-primary {
      background: #238636; color: #fff; border: 1px solid #2ea043;
    }
    .btn-primary:hover { background: #2ea043; }
    .btn-secondary {
      background: #21262d; color: #e6edf3; border: 1px solid #363b42;
    }
    .btn-secondary:hover { background: #30363d; }
    .saved-msg {
      display: none; margin-top: 12px; padding: 8px 12px;
      background: #0e4429; border: 1px solid #238636; border-radius: 6px;
      font-size: 13px; color: #3fb950;
    }
    .saved-msg.show { display: block; }
  </style>
</head>
<body>
  <div class="header">
    <svg viewBox="0 0 16 16"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"></path></svg>
    <h1>GitDisguise Settings</h1>
  </div>

  <div class="field">
    <label>Organization / Username</label>
    <div class="hint">Shown before the "/" in the header</div>
    <input type="text" id="orgName" placeholder="dev">
  </div>

  <div class="field">
    <label>Repository name</label>
    <div class="hint">Shown after the "/" in the header</div>
    <input type="text" id="repoName" placeholder="backend">
  </div>

  <div class="field">
    <label>Branch name</label>
    <div class="hint">Shown in the branch selector dropdown</div>
    <input type="text" id="branchName" placeholder="dev">
  </div>

  <div class="preview">
    Preview: <span class="repo-path"><span class="owner" id="previewOrg">dev</span> / <span class="repo" id="previewRepo">backend</span></span>
    <br><span class="branch" id="previewBranch">dev</span>
  </div>

  <div class="btn-row">
    <button class="btn btn-primary" id="saveBtn">Save settings</button>
    <button class="btn btn-secondary" id="resetBtn">Reset defaults</button>
  </div>

  <div class="saved-msg" id="savedMsg">Settings saved! Changes apply immediately.</div>

  <script src="options.js"></script>
</body>
</html>
