<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 280px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans", Helvetica, Arial, sans-serif;
      background-color: #0d1117;
      color: #c9d1d9;
      padding: 16px;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }

    .header svg {
      fill: #f0f6fc;
      width: 24px;
      height: 24px;
      flex-shrink: 0;
    }

    .header h1 {
      font-size: 16px;
      font-weight: 600;
      color: #f0f6fc;
    }

    .status {
      font-size: 13px;
      color: #8b949e;
      margin-bottom: 16px;
      padding: 8px 12px;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 6px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background-color: #484f58;
      flex-shrink: 0;
    }

    .status-dot.active {
      background-color: #3fb950;
    }

    .status-text {
      font-size: 13px;
    }

    .toggle-btn {
      width: 100%;
      padding: 8px 16px;
      font-size: 14px;
      font-weight: 500;
      font-family: inherit;
      border-radius: 6px;
      border: 1px solid #363b42;
      cursor: pointer;
      transition: background-color 0.15s ease;
    }

    .toggle-btn.activate {
      background-color: #238636;
      color: #ffffff;
      border-color: #2ea043;
    }

    .toggle-btn.activate:hover {
      background-color: #2ea043;
    }

    .toggle-btn.deactivate {
      background-color: #21262d;
      color: #f85149;
      border-color: #da3633;
    }

    .toggle-btn.deactivate:hover {
      background-color: #30363d;
    }

    .note {
      margin-top: 12px;
      font-size: 11px;
      color: #484f58;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="header">
    <svg viewBox="0 0 16 16"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"></path></svg>
    <h1>SFWX</h1>
  </div>

  <div class="status">
    <div class="status-dot" id="statusDot"></div>
    <span class="status-text" id="statusText">Checking...</span>
  </div>

  <button class="toggle-btn activate" id="toggleBtn">Enable Disguise</button>

  <div class="note">
    Works on twitter.com and x.com<br>
    <a href="#" id="settingsLink" style="color:#58a6ff; text-decoration:none; font-size:11px;">Settings</a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
